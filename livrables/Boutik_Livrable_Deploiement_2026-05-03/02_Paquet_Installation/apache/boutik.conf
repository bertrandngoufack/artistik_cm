# Alias Apache pour servir l'application Laravel "Boutik" (UltimatePOS)
# sous l'URL http://<host>:8080/boutik sans casser le site WordPress
# qui occupe http://<host>:8080/artistik_cm
#
# Ce fichier est destiné à /etc/apache2/conf-enabled/boutik.conf dans le
# conteneur "artistik-php_web". Apache le charge automatiquement au démarrage.

Alias /boutik /var/www/html/Boutik/public

# IMPORTANT — Le compose principal injecte DB_HOST/DB_NAME/DB_USER/DB_PASSWORD
# pour WordPress (artistik_cm_db). Laravel lit ces variables OS en priorité
# sur son propre .env. On les ré-écrit ici pour les requêtes /boutik.
<Location /boutik>
    SetEnv DB_HOST mariadb
    SetEnv DB_PORT 3306
    SetEnv DB_DATABASE boutik_db
    SetEnv DB_USERNAME boutik_user
    SetEnv DB_PASSWORD "Boutik_Strong_Pass_2026!"
    SetEnv DB_CONNECTION mysql
    SetEnv APP_TIMEZONE "Africa/Douala"
    SetEnv APP_LOCALE fr
    SetEnv APP_URL "http://localhost:8080/boutik"

    # CRITIQUE : Laravel 9 + Carbon 2 + PHP 8.4 émettent des warnings E_DEPRECATED
    # qui sont écrits sur stdout AVANT le moindre Set-Cookie de session, cassant
    # complètement l'authentification (pas de cookie XSRF-TOKEN ni boutik_session
    # → Page Expired / 419 sur chaque POST). On force display_errors=Off et on
    # masque E_DEPRECATED + E_STRICT pour /boutik UNIQUEMENT (WordPress conserve
    # ses propres réglages PHP).
    php_admin_value display_errors "Off"
    php_admin_value display_startup_errors "Off"
    php_admin_value error_reporting "22517"
    # 22517 = E_ALL & ~E_DEPRECATED & ~E_STRICT & ~E_NOTICE
    php_admin_flag log_errors On
    php_admin_value error_log "/var/www/html/Boutik/storage/logs/php-runtime.log"
</Location>

<Directory /var/www/html/Boutik/public>
    Options -Indexes +FollowSymLinks
    AllowOverride All
    Require all granted

    # Sécurise les fichiers sensibles
    <FilesMatch "\.(env|ini|log|sh|sql|bak|config|lock|json)$">
        Require all denied
    </FilesMatch>
</Directory>

# Bloque tout accès direct aux dossiers internes Laravel
<DirectoryMatch "^/var/www/html/Boutik/(app|bootstrap|config|database|resources|routes|storage|tests|vendor|Modules)">
    Require all denied
</DirectoryMatch>

# Verrouille les fichiers projet à la racine de Boutik
<FilesMatch "^(\.env.*|composer\.(json|lock)|artisan|README\.md|readme\.pdf|phpunit\.xml|\.htaccess)$">
    Require all denied
</FilesMatch>
