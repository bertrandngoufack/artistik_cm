[PHP]
memory_limit = 256M
max_execution_time = 300
max_input_time = 300
upload_max_filesize = 64M
post_max_size = 64M
max_input_vars = 3000

date.timezone = UTC

display_errors = On
error_reporting = E_ALL
log_errors = On
error_log = /var/log/php_errors.log

file_uploads = On
allow_url_fopen = On

; OPcache — surcharges possibles via zz-runtime.ini (généré au démarrage)
opcache.enable = 1
opcache.memory_consumption = 256
opcache.interned_strings_buffer = 16
opcache.max_accelerated_files = 10000
opcache.revalidate_freq = 2
opcache.fast_shutdown = 1
opcache.enable_cli = 1

; APCu
apc.enabled = 1
apc.shm_size = 128M

; Les extensions (gd, mysqli, redis, etc.) sont chargées via docker-php-ext ; ne pas les redéclarer ici.
