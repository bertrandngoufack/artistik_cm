[PHP]
; Limites
memory_limit = 256M
max_execution_time = 300
max_input_time = 300
upload_max_filesize = 64M
post_max_size = 64M
max_input_vars = 3000

; Timezone
date.timezone = UTC

; Error handling
display_errors = On
error_reporting = E_ALL
log_errors = On
error_log = /var/log/php_errors.log

; Fichiers
file_uploads = On
allow_url_fopen = On

; OpCache (PHP 8.4 optimisé)
opcache.enable = 1
opcache.memory_consumption = 256
opcache.interned_strings_buffer = 16
opcache.max_accelerated_files = 10000
opcache.revalidate_freq = 2
opcache.fast_shutdown = 1
opcache.enable_cli = 1

; Extensions
extension=mysqli
extension=pdo_mysql
extension=gd
extension=intl
extension=mbstring
extension=zip
extension=exif
extension=bcmath
extension=soap
extension=sockets

; Redis (si installé)
extension=redis

; APCu (si installé)
extension=apcu
apc.enabled = 1
apc.shm_size = 128M